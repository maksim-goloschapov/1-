<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="style.css">
        <title>Интерпретатор</title>
    </head>
    <body>
        <h1>🧩 Интерпретатор</h1>

        <div class="toolbar">
            <button id="add-variable">📦 Добавить переменную</button>
            <button id="add-math">➕ Добавить математику</button>
            <button id="add-if">❓ Если</button>
            <button id="exit-if">🔙 Выйти из IF</button>
            <button id="run">▶️ Запустить</button>
            <button id="add-print">🖨️ Вывод</button>
        </div>

        <div class="workspace">
            <h2>Программа:</h2>
            <div id="blocks-container"></div>
        </div>

        <div class="console">
            <h2>Консоль:</h2>
            <div id="console-output"></div>
        </div>
        <!-- Библиотека для Drag-and-Drop -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

        <script src="script.js"></script>
        
    </body>

</html>
